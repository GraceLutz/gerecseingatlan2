# Nginx production config for gerecseingatlan.hu
# Install: sudo cp deploy/nginx.conf /etc/nginx/sites-available/gerecseingatlan.hu
#          sudo ln -sf /etc/nginx/sites-available/gerecseingatlan.hu /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx

# ── Rate-limit zones ─────────────────────────────────────────────────────────
# Login: 5 requests per minute per IP
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
# Contact / newsletter forms: 3 requests per minute per IP
limit_req_zone $binary_remote_addr zone=forms:10m rate=3r/m;

# ── Upstream ──────────────────────────────────────────────────────────────────
upstream express_backend {
    server 127.0.0.1:3001;
    keepalive 16;
}

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name gerecseingatlan.hu www.gerecseingatlan.hu;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://gerecseingatlan.hu$request_uri;
    }
}

# ── www → non-www redirect (HTTPS) ───────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.gerecseingatlan.hu;

    ssl_certificate     /etc/letsencrypt/live/gerecseingatlan.hu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gerecseingatlan.hu/privkey.pem;

    return 301 https://gerecseingatlan.hu$request_uri;
}

# ── Main server block ────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name gerecseingatlan.hu;

    # ── SSL ───────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/gerecseingatlan.hu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gerecseingatlan.hu/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ── Document root ─────────────────────────────────────────────────────
    root /var/www/gerecseingatlan2/dist;
    index index.html;

    # ── Security headers ──────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://www.googletagmanager.com https://www.google-analytics.com https://maps.googleapis.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; font-src 'self'; connect-src 'self' https://www.google-analytics.com https://analytics.google.com https://maps.googleapis.com https://ingatlankozvetitok.ingatlanszoftver.hu; frame-src https://www.google.com https://maps.google.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'" always;

    # ── Gzip compression ──────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    # ── Hashed static assets (JS, CSS from Vite build) ────────────────────
    # Uses expires only (not add_header) to preserve server-level security header inheritance
    location /assets/ {
        expires 1y;
        access_log off;
    }

    # ── User uploads (served directly by nginx, not proxied) ──────────────
    location /uploads/ {
        alias /var/www/gerecseingatlan2/uploads/;
        expires 7d;
        access_log off;
    }

    # ── API proxy ─────────────────────────────────────────────────────────
    # Login endpoint: strict rate limit
    location = /api/admin/login {
        limit_req zone=login burst=2 nodelay;
        limit_req_status 429;

        proxy_pass http://express_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # Contact form: rate limited
    location = /api/contact {
        limit_req zone=forms burst=2 nodelay;
        limit_req_status 429;

        proxy_pass http://express_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # Newsletter subscription: rate limited
    location = /api/newsletter {
        limit_req zone=forms burst=2 nodelay;
        limit_req_status 429;

        proxy_pass http://express_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # Staff photo upload: allow up to 6 MB
    location ~ ^/api/admin/staff/[^/]+/photo$ {
        client_max_body_size 6m;

        proxy_pass http://express_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;
    }

    # All other API routes: proxied without extra rate limiting
    location /api/ {
        proxy_pass http://express_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # ── SPA fallback (non-API routes) ─────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;

        # add_header in a nested block disables server-level header inheritance — repeat all
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=()" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://www.googletagmanager.com https://www.google-analytics.com https://maps.googleapis.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; font-src 'self'; connect-src 'self' https://www.google-analytics.com https://analytics.google.com https://maps.googleapis.com https://ingatlankozvetitok.ingatlanszoftver.hu; frame-src https://www.google.com https://maps.google.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'" always;
        }
    }

    # ── Block dotfiles (except .well-known) ───────────────────────────────
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Deny source maps in production ────────────────────────────────────
    location ~* \.map$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Logging ───────────────────────────────────────────────────────────
    access_log /var/log/nginx/gerecseingatlan.access.log;
    error_log  /var/log/nginx/gerecseingatlan.error.log warn;
}
